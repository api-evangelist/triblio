aid: triblio
name: Triblio
description: >-
  Triblio is an account-based marketing (ABM) platform now owned by Foundry,
  the marketing services and data unit of International Data Group (IDG).
  Originally founded in Reston, Virginia, Triblio was acquired by IDG/Foundry
  in June 2020 as the cornerstone of a multi-year strategy to combine first-
  party publisher data, third-party intent signals, and ABM advertising,
  web personalization, and sales acceleration into a single platform. The
  product combines account-based advertising, intent-driven audience
  segmentation, website personalization, and a Smart Score that ranks
  accounts using behavioral signals from first-party web visits, third-party
  intent providers (notably Bombora Company Surge and G2 intent), CRM data,
  and Foundry's own publisher network. Triblio integrates with major CRMs
  and marketing automation systems including Salesforce, HubSpot, Microsoft
  Dynamics 365, SugarCRM, Marketo, Pardot, LinkedIn Campaign Manager,
  Google Analytics, and Slack. Foundry positions Triblio as the engine
  behind its broader Sales Acceleration and Foundry ABM offerings, with
  intent data feeds from Bombora ingested weekly and G2 intent ingested
  nightly. Triblio does not publish a public developer API portal, OpenAPI
  specification, or open-source SDKs; the GitHub organization at
  github.com/triblio was archived in January 2026 with no public repos.
  Customer integrations are delivered through pre-built CRM and MAP
  connectors, an Apps Marketplace, and platform-internal automation rather
  than a self-serve developer API.
